apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: authentik-postgres
  namespace: authentik
  annotations:
    cnpg.io/skipEmptyWalArchiveCheck: enabled
spec:
  instances: 3

  managed:
    roles:
      - name: authentik
        superuser: true
        login: true

  bootstrap:
    # initdb:
    #   database: authentik
    #   owner: authentik
    #   secret:
    #     name: authentik-postgres-credentials
    recovery:
      source: clusterBackup

  storage:
    size: 8Gi
    storageClass: longhorn-pg

  externalClusters:
    - name: clusterBackup
      barmanObjectStore:
        destinationPath: "s3://mthomson-cnpg-backup/authentik/"
        endpointURL: "https://s3.ca-central-1.wasabisys.com"
        s3Credentials:
          accessKeyId:
            name: wasabi-secret
            key: ACCESS_KEY_ID
          secretAccessKey:
            name: wasabi-secret
            key: ACCESS_SECRET_KEY

  backup:
    barmanObjectStore:
      destinationPath: "s3://mthomson-cnpg-backup/authentik/"
      endpointURL: "https://s3.ca-central-1.wasabisys.com"
      s3Credentials:
        accessKeyId:
          name: wasabi-secret
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: wasabi-secret
          key: ACCESS_SECRET_KEY
