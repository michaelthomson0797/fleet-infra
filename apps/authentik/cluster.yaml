apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: authentik-postgres
  namespace: authentik
spec:
  instances: 3

  managed:
    roles:
      - name: authentik
        superuser: true
        login: true

  bootstrap:
    initdb:
      database: authentik
      owner: authentik
      secret:
        name: authentik-postgres-credentials

  storage:
    size: 8Gi
    storageClass: longhorn-pg
