apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: booklore
  namespace: booklore
spec:
  chart:
    spec:
      chart: ./example-chart
      sourceRef:
        kind: GitRepository
        name: booklore
  interval: 15m
  releaseName: booklore
  values:
    image:
      repository: booklore/booklore
      # This sets the pull policy for images.
      pullPolicy: Always
      # Overrides the image tag whose default is the chart appVersion.
      tag: latest
    mariadb:
      enabled: true
      image:
        tag: latest
      auth:
        database: booklore
        username: booklore-user

    ingress:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
        external-dns.alpha.kubernetes.io/target: michaelthomson.ddns.net
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        traefik.ingress.kubernetes.io/router.tls: "true"
      hosts:
        - host: booklore.michaelthomson.dev
          paths:
            - path: "/"
              pathType: ImplementationSpecific
      tls:
        - hosts:
            - booklore.michaelthomson.dev
          secretName: booklore-tls

    # If you want to bring your own persistence (such as a hostPath),
    # disable these and do so in extraVolumes/extraVolumeMounts
    persistence:
      dataVolume:
        enabled: true
        size: 1Gi
      booksVolume:
        enabled: true
        size: 10Gi
