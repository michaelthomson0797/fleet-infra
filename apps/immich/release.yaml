apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  chart:
    spec:
      chart: immich
      version: 0.x
      sourceRef:
        kind: HelmRepository
        name: immich
  interval: 15m
  releaseName: immich
  values:
    defaultPodOptions:
      runtimeClassName: nvidia

    controllers:
      main:
        containers:
          main:
            image:
              tag: v2.1.0
            env:
              DB_HOSTNAME: "immich-postgres-rw"
              DB_USERNAME: "immich"
              DB_DATABASE_NAME: "immich"
              DB_PASSWORD: "immich"
              NVIDIA_VISIBLE_DEVICES: "all"
              NVIDIA_DRIVER_CAPABILITIES: "all"

    immich:
      persistence:
        library:
          existingClaim: immich-data

    valkey:
      enabled: true
      controllers:
        main:
          containers:
            main:
              resources:
                requests:
                  nvidia.com/gpu-all: 1
                limits:
                  nvidia.com/gpu-all: 1

    server:
      enabled: true
      controllers:
        main:
          containers:
            main:
              resources:
                requests:
                  nvidia.com/gpu-all: 1
                limits:
                  nvidia.com/gpu-all: 1
      ingress:
        main:
          enabled: true
          annotations:
            cert-manager.io/cluster-issuer: "letsencrypt-prod"
            external-dns.alpha.kubernetes.io/target: michaelthomson.ddns.net
            external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
            traefik.ingress.kubernetes.io/router.entrypoints: websecure
            traefik.ingress.kubernetes.io/router.tls: "true"
          hosts:
            - host: immich.michaelthomson.dev
              paths:
                - path: "/"
          tls:
            - hosts:
                - immich.michaelthomson.dev
              secretName: immich-tls

    machine-learning:
      enabled: true
      controllers:
        main:
          containers:
            main:
              resources:
                requests:
                  nvidia.com/gpu-all: 1
                limits:
                  nvidia.com/gpu-all: 1
