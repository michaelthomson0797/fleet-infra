apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  chart:
    spec:
      chart: immich
      version: 0.x
      sourceRef:
        kind: HelmRepository
        name: immich
  interval: 15m
  releaseName: immich
  values:
    defaultPodOptions:
      runtimeClassName: nvidia

    controllers:
      main:
        containers:
          main:
            image:
              tag: v2.1.0
            env:
              DB_HOSTNAME: "immich-postgres-rw"
              DB_USERNAME: "immich"
              DB_DATABASE_NAME: "immich"
              DB_PASSWORD: "immich"
              NVIDIA_VISIBLE_DEVICES: "all"
              NVIDIA_DRIVER_CAPABILITIES: "all"

    immich:
      persistence:
        library:
          existingClaim: immich-data

    valkey:
      enabled: true

    server:
      enabled: true
      resources:
        limits:
          nvidia.com/gpu: 1
      ingress:
        main:
          enabled: true
          annotations:
            traefik.ingress.kubernetes.io/router.entrypoints: websecure
            traefik.ingress.kubernetes.io/router.tls: "true"
          hosts:
            - host: immich.michaelthomson.dev
              paths:
                - path: "/"
          tls:
            - hosts:
                - immich.michaelthomson.dev
              secretName: letsencrypt-wildcard-cert-michaelthomson.dev

    machine-learning:
      enabled: true
      main:
        containers:
          main:
            resources:
              limits:
                nvidia.com/gpu: 1
