apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: roundcube
  namespace: flux-system
spec:
  interval: 15m
  path: ./roundcube
  prune: true # remove any elements later removed from the above path
  timeout: 2m # if not set, this defaults to interval duration, which is 1h
  sourceRef:
    kind: GitRepository
    name: flux-system
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: roundcubemail
      namespace: roundcube
    - apiVersion: apps/v1
      kind: Deployment
      name: roundcubedb
      namespace: roundcube
