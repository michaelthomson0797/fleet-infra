apiVersion: apps/v1
kind: Deployment
metadata:
  name: homeassistant
  namespace: homeassistant
spec:
  selector:
    matchLabels:
      app: homeassistant
  template:
    metadata:
      labels:
        app: homeassistant
    spec:
      containers:
      - name: homeassistant
        image: lscr.io/linuxserver/homeassistant:latest
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: homeassistant-config
            optional: false
        ports:
        - containerPort: 8123
          name: http
          protocol: TCP
        volumeMounts:
        - name: config
          mountPath: /config
        securityContext:
          privileged: true
          capabilities:
            add:
              - NET_ADMIN
              - NET_RAW
        hostNetwork: true
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: homeassistant-config
