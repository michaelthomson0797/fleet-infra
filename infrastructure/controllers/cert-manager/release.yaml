apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  chart:
    spec:
      chart: cert-manager
      version: v1.19.x
      sourceRef:
        kind: HelmRepository
        name: cert-manager
  interval: 15m
  releaseName: cert-manager
  values:
    crds:
      enabled: true
