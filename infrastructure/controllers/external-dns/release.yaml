apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: external-dns
spec:
  chart:
    spec:
      chart: external-dns
      version: v1.19.x
      sourceRef:
        kind: HelmRepository
        name: external-dns
  interval: 15m
  releaseName: external-dns
  values:
    sources:
      - crd
      - ingress
    provider:
      name: cloudflare
    env:
      - name: CF_API_KEY
        valueFrom:
          secretKeyRef:
            name: secret
            key: cloudflare_api_key
      - name: CF_API_EMAIL
        value: michael@michaelthomson.dev
