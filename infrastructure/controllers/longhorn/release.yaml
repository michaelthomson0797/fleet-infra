apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  chart:
    spec:
      chart: longhorn
      version: 1.9.x
      sourceRef:
        kind: HelmRepository
        name: longhorn
  interval: 15m
  releaseName: longhorn
  values:
    persistence:
      defaultClassReplicaCount: 3
      recurringJobSelector:
        enable: true
        jobList: |
          [
            {
              "name":"backup",
              "isGroup":true
            },
            {
              "name":"snapshot",
              "isGroup":true
            }
            {
              "name":"trim",
              "isGroup":true
            }
          ]

    defaultSettings:
      backupTarget: s3://mthomson-longhorn-backups@us-west-004/
      backupTargetCredentialSecret: longhorn-backblaze-secret
      replicaAutoBalance: best-effort
      defaultDataLocality: best-effort
      defaultReplicaCount: 3
      replicaZoneSoftAntiAffinity: true
      replicaDiskSoftAntiAffinity: false
      replicaSoftAntiAffinity: false

    ingress:
      enabled: true
      ingressClassName: traefik
      host: longhorn.michaelthomson.dev
      tls: true
      secureBackends: true
      tlsSecret: letsencrypt-wildcard-cert-michaelthomson.dev
      annotations:
        traefik.ingress.kubernetes.io/router.tls: "true"
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
