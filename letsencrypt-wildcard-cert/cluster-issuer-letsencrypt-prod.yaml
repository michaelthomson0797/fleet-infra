apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    email: michael@michaelthomson.dev
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-staging
    solvers:
    - selector:
        dnsZones:
          - "michaelthomson.dev"
      dns01:
        cloudflare:
          email: michael@michaelthomson.dev
          apiTokenSecretRef:
            name: cloudflare-api-key
            key: cloudflare_api_key
