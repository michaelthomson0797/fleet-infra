apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  chart:
    spec:
      chart: longhorn
      version: 1.7.x
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
  interval: 15m
  timeout: 5m
  releaseName: longhorn
  values:
    persistence:
      defaultClassReplicaCount: 2

    defaultSettings:
      backupTarget: s3://mthomson-longhorn-backups@us-west-004/
      backupTargetCredentialSecret: longhorn-backblaze-secret
      replicaAutoBalance: best-effort
      defaultDataLocality: best-effort
      defaultReplicaCount: 2
      replicaZoneSoftAntiAffinity: false
      replicaDiskSoftAntiAffinity: false
      replicaSoftAntiAffinity: false

    ingress:
      enabled: true
      ingressClassName: traefik
      host: longhorn.michaelthomson.dev
      tls: true
      secureBackends: true
      tlsSecret: letsencrypt-wildcard-cert-michaelthomson.dev
      annotations:
        traefik.ingress.kubernetes.io/router.tls: "true"
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
