apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: nvidia-device-plugin
  namespace: nvidia-device-plugin
spec:
  chart:
    spec:
      chart: nvidia-device-plugin
      version: 0.x
      sourceRef:
        kind: HelmRepository
        name: nvidia-device-plugin
        namespace: flux-system
  interval: 15m
  timeout: 5m
  releaseName: nvidia-device-plugin
  values:
    runtimeClassName: nvidia

    gfd:
      enabled: true
