apiVersion: batch/v1
kind: CronJob
metadata:
  name: cleandb
  namesapce: roundcube
spec:
  schedule: "@daily"
  concurrencyPolicy: Replace
  jobTemplate:
    spec:
      template:
        metadata:
          name:  cleandb
        spec:
          restartPolicy: OnFailure
          containers:
            - name: roundcubemail
              image: roundcube/roundcubemail:latest-fpm-alpine
              imagePullPolicy: ""
              env:
              - name: ROUNDCUBEMAIL_DB_TYPE
                value: pgsql
              - name: ROUNDCUBEMAIL_DB_HOST
                value: roundcubedb
              - name: ROUNDCUBEMAIL_DB_NAME
                value: roundcube
              - name: ROUNDCUBEMAIL_DB_USER
                valueFrom:
                  secretKeyRef:
                    name: roundcubemail-shared-secret
                    key: DB_USER
              - name: ROUNDCUBEMAIL_DB_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: roundcubemail-shared-secret
                    key: DB_PASSWORD
              - name: ROUNDCUBEMAIL_DES_KEY
                valueFrom:
                  secretKeyRef:
                    name: roundcubemail-shared-secret
                    key: DES_KEY
              - name: ROUNDCUBEMAIL_DEFAULT_HOST
                value: tls://mail.michaelthomson.dev
              - name: ROUNDCUBEMAIL_SMTP_SERVER
                value: tls://mail.michaelthomson.dev
              - name: ROUNDCUBEMAIL_SKIN
                value: elastic
              - name: ROUNDCUBEMAIL_PLUGINS
                value: archive,zipdownload,newmail_notifier
              args:
                - bin/cleandb.sh
