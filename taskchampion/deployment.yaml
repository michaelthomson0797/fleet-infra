apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskchampion
  namespace: taskchampion
spec:
  selector:
    matchLabels:
      app: taskchampion
  template:
    metadata:
      labels:
        app: taskchampion
    spec:
      initContainers:
      - name: mkdir
        image: busybox:1.28
        command: ['sh', '-c', 'chown -R 100:100 /tss']
        volumeMounts:
        - name: data
          mountPath: /tss
      containers:
      - name: taskchampion
        image: ghcr.io/gothenburgbitfactory/taskchampion-sync-server:latest
        imagePullPolicy: Always
        args: ["--data-dir", "/tss", "--port", "8080"]
        env:
        - name: RUST_LOG
          value: info
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        volumeMounts:
        - name: data
          mountPath: /tss
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: taskchampion-data
