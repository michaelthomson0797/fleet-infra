apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: todo-postgresql
  namespace: todo
spec:
  chart:
    spec:
      chart: postgresql
      version: 15.x
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
  interval: 15m
  timeout: 5m
  releaseName: postgresql
  values:
    global:
      storageClass: "longhorn"
      postgresql:
        auth:
          username: "todo"
          database: "todos"
          existingSecret: "database-secrets"
          secretKeys:
            adminPasswordKey: "ADMIN_PASSWORD"
            userPasswordKey: "USER_PASSWORD"
            replicationPasswordKey: "REPLICATION_PASSWORD"
    primary:
      persistence:
        size: 1Gi
    readReplicas:
      persistence:
        size: 1Gi
