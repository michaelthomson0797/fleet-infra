apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: radarr
  namespace: authentik
spec:
  forwardAuth:
    address: https://radarr.michaelthomson.dev/outpost.goauthentik.io/auth/traefik
    trustForwardHeader: true
    authResponseHeaders:
    - X-authentik-username
    - X-authentik-groups
    - X-authentik-email
    - X-authentik-name
    - X-authentik-uid
    - X-authentik-jwt
    - X-authentik-meta-jwks
    - X-authentik-meta-outpost
    - X-authentik-meta-provider
    - X-authentik-meta-app
    - X-authentik-meta-version
    - authorization
    tls:
      certSecret: letsencrypt-wildcard-cert-michaelthomson.dev
