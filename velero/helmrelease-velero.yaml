apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: velero
  namespace: velero
spec:
  chart:
    spec:
      chart: velero
      version: 6.x
      sourceRef:
        kind: HelmRepository
        name: vmware-tanzu
        namespace: flux-system
  interval: 15m
  timeout: 5m
  releaseName: velero
  values:
    initContainers:
    - name: velero-plugin-for-aws
      image: velero/velero-plugin-for-aws:v1.9.0
      imagePullPolicy: IfNotPresent
      volumeMounts:
      - mountPath: /target
        name: plugins
    configuration:
      backupStorageLocation:
        # name is the name of the backup storage location where backups should be stored. If a name is not provided,
        # a backup storage location will be created with the name "default". Optional.
      - name: backblaze
        default: true
        # provider is the name for the backup storage location provider.
        provider: aws
        # bucket is the name of the bucket to store backups in. Required.
        bucket: mthomson-cluster-backup
        credential:
          # name of the secret used by this backupStorageLocation.
          name: velero-secret
          # name of key that contains the secret data to be used.
          key: cloud
        # Additional provider-specific configuration. See link above
        # for details of required/optional fields for your provider.
        config:
          region: us-west-004
          s3Url: "https://s3.us-west-004.backblazeb2.com"
      volumeSnapshotLocation:
        # name is the name of the volume snapshot location where snapshots are being taken. Required.
      - name: longhorn
        # provider is the name for the volume snapshot provider.
        provider: csi
      defaultVolumeSnapshotLocations: longhorn
      features: EnableCSI
    schedules:
      daily-backup:
        disabled: false
        schedule: "0 0 * * *" # once a day, at midnight
        useOwnerReferencesInBackup: false
        template:
          ttl: "240h"
          storageLocation: backblaze # use the same name you defined above in backupStorageLocation
          excludedNamespaces:
          - media

